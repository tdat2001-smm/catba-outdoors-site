<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — Catba Outdoors PMS</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="badge">🌊</div>
      <h1>Catba Outdoors PMS</h1>
      <p>Admin console — quản lý vận hành</p>
    </div>

    <div id="loginError" class="login-error"></div>

    <form id="loginForm" class="login-form" autocomplete="off">
      <div class="form-group">
        <label for="username">Tên đăng nhập</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit" id="loginBtn">Đăng nhập</button>
    </form>

    <div class="login-hint">
      Tài khoản mặc định: <strong>admin</strong> / <strong>catba2026</strong>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    if (Auth.getSession()) window.location.href = 'dashboard.html';

    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Đang đăng nhập...';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const result = await Auth.login(username, password);
      btn.disabled = false;
      btn.textContent = 'Đăng nhập';
      if (!result.ok) {
        errorBox.textContent = result.error;
        errorBox.style.display = 'block';
        return;
      }
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
